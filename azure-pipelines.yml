trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - release/*

resources:
  repositories:
    - repository: self
      type: git
      #name: ${{ parameters.repoToCheckout }}

parameters:
  - name: RunWindows
    type: boolean
    default: "true"
  - name: RunLinux
    type: boolean
    default: "true"
  - name: BuildX64
    displayName: "Check to enable the x64 builds"
    type: boolean
    default: "true"
  - name: BuildDebug
    displayName: "Check to enable the Debug builds"
    type: boolean
    default: "false"
  - name: PublishNuGet
    displayName: "Defaults to false but its auto set to true when building on main/master"
    type: boolean
    default: "false"
  - name: PublishGitHub
    displayName: "Defaults to false but its auto set to true when building on main/master"
    type: boolean
    default: "false"

variables:
  # Set the publish if we're building on main/master
  ${{ if and(eq(parameters.PublishNuGet, false), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))) }}:
    PublishNuGet: true
    PublishGitHub: true
  ${{ else }}:
    PublishNuGet: ${{ parameters.PublishNuGet }}
    PublishGitHub: ${{ parameters.PublishGitHub }}

stages:
  - stage: BuildWindows
    displayName: Windows
    dependsOn: []
    condition: eq(${{ parameters.RunWindows }}, true)
    jobs:
      ${{ if eq(parameters.BuildX64, true) }}:
        - template: .ci/azure-pipelines-windows-template.yml
          parameters:
            displayName: Windows x64
            architecture: x64
            matrixConfigs:
              Windows_x64_Release:
                BuildType: Release
                BuildArchitecture: x64
                cmake.preset: Windows-$(BuildArchitecture)-$(BuildType)
              ${{ if eq(parameters.BuildDebug, true) }}:
                Windows_x64_Debug:
                  BuildType: Debug
                  BuildArchitecture: x64
                  cmake.preset: Windows-$(BuildArchitecture)-$(BuildType)
            runTests: true
            publishNuGet: ${{ parameters.PublishNuGet }}

      - template: .ci/azure-pipelines-windows-template.yml
        parameters:
          displayName: Windows arm64
          architecture: arm64
          matrixConfigs:
            Windows_arm64_Release:
              BuildType: Release
              BuildArchitecture: arm64
              cmake.preset: Windows-$(BuildArchitecture)-$(BuildType)
            ${{ if eq(parameters.BuildDebug, true) }}:
              Windows_arm64_Debug:
                BuildType: Debug
                BuildArchitecture: arm64
                cmake.preset: Windows-$(BuildArchitecture)-$(BuildType)
          runTests: true
          publishNuGet: ${{ parameters.PublishNuGet }}

  - stage: BuildLinux
    displayName: Linux
    dependsOn: []
    condition: eq(${{ parameters.RunLinux }}, true)
    jobs:
      - template: .ci/azure-pipelines-linux-template.yml
        parameters:
          displayName: Linux
          matrixConfigs:
            Linux_GCC_Release:
              BuildType: Release
              LinuxCompiler: GCC
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            ${{ if eq(parameters.BuildDebug, true) }}:
              Linux_GCC_Debug:
                BuildType: Debug
                LinuxCompiler: GCC
                cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            Linux_Clang_Release:
              BuildType: Release
              LinuxCompiler: Clang
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            ${{ if eq(parameters.BuildDebug, true) }}:
              Linux_Clang_Debug:
                BuildType: Debug
                LinuxCompiler: Clang
                cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
          runTests: true

  - stage: Publication
    displayName: Nuget Publication and GitHub Release
    dependsOn:
      - BuildWindows
      - BuildLinux
    condition: and(succeeded(), eq(variables['PublishGitHub'], true))
    jobs:
      - template: .ci/azure-pipelines-github-release-template.yml
