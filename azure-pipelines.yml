trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - release/*

resources:
  repositories:
    - repository: self
      type: git
      name: SiddiqSoft/restcl

parameters:
  - name: RunWindows
    type: boolean
    default: true
  - name: RunLinux
    type: boolean
    default: true
  - name: Architecture
    type: string
    default: arm64
    values:
      - x64
      - arm64
  - name: LinuxCompiler
    type: string
    default: GCC
    values:
      - GCC
      - Clang
  - name: PublishNuGet
    type: boolean
    default: false
  - name: PublishGitHub
    type: boolean
    default: false

stages:
  - stage: BuildWindows
    displayName: Windows ${{ parameters.Architecture }}
    dependsOn: []
    condition: eq(${{ parameters.RunWindows }}, true)
    jobs:
      - template: .ci/azure-pipelines-windows-template.yml
        parameters:
          displayName: Windows ${{ parameters.Architecture }}
          architecture: ${{ parameters.Architecture }}
          matrixConfigs:
            Windows_Release:
              BuildType: Release
              cmake.preset: Windows-${{ parameters.Architecture }}-$(BuildType)
            Windows_Debug:
              BuildType: Debug
              cmake.preset: Windows-${{ parameters.Architecture }}-$(BuildType)
          runTests: true
          publishNuGet: ${{ parameters.PublishNuGet }}

  - stage: BuildLinux
    displayName: Linux ${{ parameters.LinuxCompiler }}
    dependsOn: []
    condition: eq(${{ parameters.RunLinux }}, true)
    jobs:
      - template: .ci/azure-pipelines-linux-template.yml
        parameters:
          displayName: Linux ${{ parameters.LinuxCompiler }}
          linuxCompiler: ${{ parameters.LinuxCompiler }}
          matrixConfigs:
            Linux_Release:
              BuildType: Release
              cmake.preset: Linux-${{ parameters.LinuxCompiler }}-$(BuildType)
            Linux_Debug:
              BuildType: Debug
              cmake.preset: Linux-${{ parameters.LinuxCompiler }}-$(BuildType)
          runTests: true

  - stage: GitHubRelease
    displayName: GitHub Release
    dependsOn:
      - BuildWindows
      - BuildLinux
    condition: and(succeeded(), eq(${{ parameters.PublishGitHub }}, true))
    jobs:
      - template: .ci/azure-pipelines-github-release-template.yml
