trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - release/*

resources:
  repositories:
    - repository: self
      type: git
      name: SiddiqSoft/restcl

parameters:
  - name: RunWindows
    type: boolean
    default: true
  - name: RunLinux
    type: boolean
    default: true
  - name: Architecture
    type: string
    default: arm64
    values:
      - x64
      - arm64
  - name: PublishNuGet
    type: boolean
    default: false
  - name: PublishGitHub
    type: boolean
    default: false

variables:
  # Set the publish if we're building on main/master
  ${{ if and(eq(parameters.PublishNuGet, false), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master'))) }}:
    PublishNuGet: true
    PublishGitHub: true
  ${{ else }}:
    PublishNuGet: ${{ parameters.PublishNuGet }}
    PublishGitHub: ${{ parameters.PublishGitHub }}

stages:
  - stage: BuildWindows
    displayName: Windows ${{ parameters.Architecture }}
    dependsOn: []
    condition: eq(${{ parameters.RunWindows }}, true)
    jobs:
      - template: .ci/azure-pipelines-windows-template.yml
        parameters:
          displayName: Windows ${{ parameters.Architecture }}
          architecture: ${{ parameters.Architecture }}
          matrixConfigs:
            Windows_Release:
              BuildType: Release
              cmake.preset: Windows-${{ parameters.Architecture }}-$(BuildType)
            Windows_Debug:
              BuildType: Debug
              cmake.preset: Windows-${{ parameters.Architecture }}-$(BuildType)
          runTests: true
          publishNuGet: ${{ parameters.PublishNuGet }}

  - stage: BuildLinux
    displayName: Linux
    dependsOn: []
    condition: eq(${{ parameters.RunLinux }}, true)
    jobs:
      - template: .ci/azure-pipelines-linux-template.yml
        parameters:
          displayName: Linux
          matrixConfigs:
            Linux_GCC_Release:
              BuildType: Release
              LinuxCompiler: GCC
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            Linux_GCC_Debug:
              BuildType: Debug
              LinuxCompiler: GCC
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            Linux_Clang_Release:
              BuildType: Release
              LinuxCompiler: Clang
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
            Linux_Clang_Debug:
              BuildType: Debug
              LinuxCompiler: Clang
              cmake.preset: Linux-$(LinuxCompiler)-$(BuildType)
          runTests: true

  - stage: Publication
    displayName: Nuget Publication and GitHub Release
    dependsOn:
      - BuildWindows
      - BuildLinux
    condition: and(succeeded(), eq(variables['PublishGitHub'], true))
    jobs:
      - template: .ci/azure-pipelines-github-release-template.yml
