trigger:
  branches:
    include:
      - main
      - master
      - development
      - develop
      - release/*

pr:
  branches:
    include:
      - main
      - release/*

resources:
  repositories:
    - repository: self
      type: git
      name: SiddiqSoft/restcl

parameters:
  - name: RunWindows
    type: boolean
    default: true
  - name: RunLinux
    type: boolean
    default: false
  - name: Architecture
    type: string
    default: x64
    values:
      - x64
      - arm64

stages:
  - stage: Windows
    displayName: Windows ${{ parameters.Architecture }}
    condition: eq(${{ parameters.RunWindows }}, true)
    jobs:
      - template: azure-pipelines-windows-template.yml
        parameters:
          displayName: Windows
          architecture: ${{ parameters.Architecture }}
          matrixConfigs:
            Windows_Release:
              BuildType: Release
              cmake.preset: ${{ variables['System.StageName'] }}-${{ parameters.Architecture }}-$(BuildType)
            Windows_Debug:
              BuildType: Debug
              cmake.preset: ${{ variables['System.StageName'] }}-${{ parameters.Architecture }}-$(BuildType)

  - stage: Linux
    displayName: Linux ${{ parameters.Architecture }}
    condition: eq(${{ parameters.RunLinux }}, true)
    jobs:
      - template: azure-pipelines-linux-template.yml
        parameters:
          displayName: Linux
          architecture: ${{ parameters.Architecture }}
          matrixConfigs:
            Linux_Release:
              BuildType: Release
              cmake.preset: ${{ variables['System.StageName'] }}-${{ parameters.Architecture }}-$(BuildType)
            Linux_Debug:
              BuildType: Debug
              cmake.preset: ${{ variables['System.StageName'] }}-${{ parameters.Architecture }}-$(BuildType)