parameters:
  - name: displayName
    type: string
  - name: PublishNuGet
    type: boolean
    default: true
  - name: PublishGitHub
    type: boolean
    default: true
  - name: TagVersion
    type: string
    default: "0.0.0"
  - name: ExtraParam0
    type: string
    default: "0.0.0"
  - name: ExtraParam1
    type: string
    default: "0.0.1"

jobs:
  - job: NugetRelease
    displayName: Nuget Release
    pool:
      name: Default
      #demands:
      #  - Agent.OS -equals Windows_NT

    steps:
      - checkout: none
        
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "extraparam0: $(ExtraParam0). ${{ parameters.ExtraParam0 }}"
            echo "extraparam1: $(ExtraParam1)   ${{ parameters.ExtraParam1 }}"
            echo "TagVersion: $(TagVersion). ${{ parameters.TagVersion }}"
            echo "----------------------------------------------------------------"
            set 
      
      - task: DownloadBuildArtifacts@0
        displayName: "Download NuGet packages"
        inputs:
          downloadType: "single"
          artifactName: "nuget-packages"
          downloadPath: "$(Build.ArtifactStagingDirectory)"
        condition: succeeded()

      - task: NuGetCommand@2
        displayName: "NuGet push v$(TagVersion)"
        inputs:
          command: "push"
          packagesToPush: "$(Build.ArtifactStagingDirectory)/**/*.nupkg"
          nuGetFeedType: "external"
          publishFeedCredentials: "sqs-nuget"
        condition: and(succeeded(), eq(variables['PublishNuGet'], true))
