parameters:
  - name: architecture
    type: string
  - name: matrixConfigs
    type: object

jobs:
  - job: Test
    pool:
      name: Default
      demands:
        - ${{ if contains(variables['cmake.preset'], 'Windows') }}:
          - Agent.OS -equals Windows_NT
          - Agent.OSArchitecture -equals ${{ parameters.architecture }}
        - ${{ if contains(variables['cmake.preset'], 'Linux') }}:
          - Agent.OS -equals Linux
    displayName: Test ${{ parameters.architecture }}
    strategy:
      matrix: ${{ parameters.matrixConfigs }}
    steps:
      - checkout: self

      - task: DownloadPipelineArtifact@2
        displayName: "Download pipeline artifacts for $(cmake.preset)"
        inputs:
          buildType: current
          artifactName: "build-$(cmake.preset)"
          targetPath: "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)"

      - task: Bash@3
        displayName: "Restore permissions for Linux test executables"
        condition: eq(variables['Agent.OS'], 'Linux')
        inputs:
          targetType: inline
          script: |
            artifact_dir="$(System.DefaultWorkingDirectory)/build/$(cmake.preset)"
            if [ -d "$artifact_dir/tests" ]; then
              find "$artifact_dir/tests" -type f -exec chmod +x {} +
            fi
            if [ -d "$artifact_dir/bin" ]; then
              find "$artifact_dir/bin" -type f -exec chmod +x {} +
            fi

      - task: Bash@3
        displayName: "List downloaded artifacts"
        condition: eq(variables['Agent.OS'], 'Linux')
        inputs:
          targetType: inline
          script: |
            echo "Contents of $(System.DefaultWorkingDirectory):"
            find "$(System.DefaultWorkingDirectory)" -maxdepth 3 -type f | sort | head -100
            echo "----"

      - task: PowerShell@2
        displayName: "List downloaded artifacts"
        condition: eq(variables['Agent.OS'], 'Windows_NT')
        inputs:
          targetType: inline
          script: |
            Write-Host "Contents of $(System.DefaultWorkingDirectory):"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 100 | ForEach-Object { Write-Host $_.FullName }

      - task: CMake@1
        displayName: "CMake Tests `$(cmake.preset)`"
        inputs:
          cmakeArgs: "-E chdir $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests ctest --output-junit $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml --output-on-failure"
        continueOnError: true

      - task: PublishTestResults@2
        displayName: "Publish Test Results $(cmake.preset)_test_detail.xml"
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml"
          mergeTestResults: false
          buildConfiguration: "$(BuildType)"
        continueOnError: true
