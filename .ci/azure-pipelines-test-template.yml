parameters:
  - name: architecture
    type: string
  - name: matrixConfigs
    type: object

jobs:
  - job: Test
    pool:
      name: Default
      demands:
        - ${{ if contains(variables['cmake.preset'], 'Windows') }}:
          - Agent.OS -equals Windows_NT
          - Agent.OSArchitecture -equals ${{ parameters.architecture }}
        - ${{ if contains(variables['cmake.preset'], 'Linux') }}:
          - Agent.OS -equals Linux
    displayName: Test ${{ parameters.architecture }}
    strategy:
      matrix: ${{ parameters.matrixConfigs }}
    steps:
      - checkout: self

      - task: DownloadPipelineArtifact@2
        displayName: "Download pipeline artifacts for $(cmake.preset)"
        inputs:
          buildType: "current"
          artifactName: "build-$(cmake.preset)"
          targetPath: "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)"
          extractOptions: "tar" # this will preserve file permissions, which is important for the test executables
      
      - task: Bash@3
        displayName: "List downloaded artifacts"
        inputs:
          targetType: inline
          script: |
            echo "Contents of System.DefaultWorkingDirectory:"
            find $(System.DefaultWorkingDirectory) -type f -name "*.xml" 2>/dev/null | head -20
            echo "---"
            ls -lFa $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/ 2>/dev/null || echo "Directory not found"
            echo "---"
            ls -lFa $(System.DefaultWorkingDirectory)/ 2>/dev/null
            echo "---"
            ls -lFa $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests 2>/dev/null || echo "tests Directory not found"
        condition: eq(variables['Agent.OS'], 'Linux')

      - task: PowerShell@2
        displayName: "List downloaded artifacts"
        inputs:
          targetType: inline
          script: |
            Write-Host "Contents of System.DefaultWorkingDirectory:"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)" -Recurse -Filter "*.xml" -ErrorAction SilentlyContinue | Select-Object -First 20 | ForEach-Object { Write-Host $_.FullName }
            Write-Host "---$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/" -ErrorAction SilentlyContinue
            Write-Host "---$(System.DefaultWorkingDirectory)/---"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/" -ErrorAction SilentlyContinue
            Write-Host "---$(System.DefaultWorkingDirectory)/pack---"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/pack" -ErrorAction SilentlyContinue
            Write-Host "---$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests---"
            Get-ChildItem -Path "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests" -ErrorAction SilentlyContinue
        condition: eq(variables['Agent.OS'], 'Windows_NT')

      - task: CMake@1
        displayName: "CMake Tests `$(cmake.preset)`"
        inputs:
          cmakeArgs: "-E chdir $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests ctest --output-junit $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml --output-on-failure"
        continueOnError: true

      - task: PublishTestResults@2
        displayName: "Publish Test Results $(cmake.preset)_test_detail.xml"
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml"
          mergeTestResults: false
          buildConfiguration: "$(BuildType)"
        continueOnError: true
