parameters:
  - name: displayName
    type: string
  - name: PublishNuGet
    type: boolean
    default: true
  - name: PublishGitHub
    type: boolean
    default: true
  - name: TagVersion
    type: string
    default: "0.0.0"
  - name: ExtraParam0
    type: string
    default: "0.0.0"
  - name: ExtraParam1
    type: string
    default: "0.0.1"

jobs:
  - job: GitHubRelease
    variables:
      xtmp0: $[stageDependencies.StgBldLinux.JobLinuxBuild.outputs['SETVER.VTAG']]
      xtmp0a: $[stageDependencies.StgBldLinux.JobLinuxBuild.outputs['SETVER_VTAG']]
      xtmp1: $[stageDependencies.StgBldWindows.JobWindowsBuild_arm64.outputs['SETVER0.VTAG0']]
      xtmp1a: $[stageDependencies.StgBldWindows.JobWindowsBuild_arm64.outputs['SETVER0_VTAG0']]
    displayName: GitHub Release
    pool:
      name: Default

    steps:
      - checkout: none
      #- task: DownloadBuildArtifacts@0
      #  displayName: "Download release assets"
      #  inputs:
      #    downloadType: "single"
      #    artifactName: "release-assets"
      #    downloadPath: "$(Build.ArtifactStagingDirectory)"
        
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "extraparam0: $(ExtraParam0). ${{ parameters.ExtraParam0 }}"
            echo "extraparam1: $(ExtraParam1)   ${{ parameters.ExtraParam1 }}"
            echo "TagVersion: $(TagVersion). ${{ parameters.TagVersion }}"
            echo "----------------------------------------------------------------"
            set 
      
      - task: GitHubRelease@1
        displayName: "Release to GitHub v$(TagVersion)"
        inputs:
          gitHubConnection: "github-packages-sqs"
          repositoryName: "$(Build.Repository.Name)"
          action: "create"
          target: "$(Build.SourceVersion)"
          tagSource: "userSpecifiedTag"
          tag: "$(TagVersion)"
          title: "v$(TagVersion)"
          releaseNotesSource: "inline"
          releaseNotesInline: "Documentation https://github.com/$(Build.Repository.Name)"
          isPreRelease: true
          changeLogCompareToRelease: "lastFullRelease"
          changeLogType: "commitBased"
          addChangeLog: false
          assetUploadMode: "replace"
          assets: "$(Build.ArtifactStagingDirectory)/**/*"
        condition: and(succeeded(), eq(variables['PublishGitHub'], true))
