parameters:
  - name: displayName
    type: string
  - name: PublishNuGet
    type: boolean
    default: true
  - name: PublishGitHub
    type: boolean
    default: true
  - name: ExtraParam
    type: string
    default: "0.0.0"

jobs:
  - job: GitHubRelease
    displayName: GitHub Release
    pool:
      name: Default
      demands:
        - Agent.OS -equals Windows_NT
    variables:
      TagVersion: $[stageDependencies.StgBldWindows.JobWindowsBuild_arm64.outputs['SetVersionForFuture.TagVersion']]
      XPublishVersion: $[stageDependencies.StgBldLinux.JobLinuxBuild.outputs['SetVersionForFuture.THATBUILDVERSION']]
      THISBUILDVERSION: $[stageDependencies.StgBldLinux.JobLinuxBuild.outputs['SetVersionForFuture.THISBUILDVERSION']]
      XBUILDVERSION: $[ variables['ExtraParam'] ]
      PUBLISHVERSION: $[stageDependencies.StgBldLinux.JobLinuxBuild.outputs['SetVersionForFuture.THISBUILDVERSION']]

    steps:
      - checkout: none
      #- task: DownloadBuildArtifacts@0
      #  displayName: "Download release assets"
      #  inputs:
      #    downloadType: "single"
      #    artifactName: "release-assets"
      #    downloadPath: "$(Build.ArtifactStagingDirectory)"
        
      - task: CmdLine@2
        displayName: "Echo variables for debugging"
        inputs:
          script: |
            echo "-------------------------------- "
            echo "PublishNuGet: $(PublishNuGet)"
            echo "extraparam: ${{ parameters.ExtraParam }}"
            echo "PublishGitHub: $(PublishGitHub)"
            echo "PublishVersion: $(PublishVersion)"
            echo "XPublishVersion: $(XPublishVersion)"
            echo "TagVersion: $(TagVersion)"
            echo "XBUILDVERSION: $(XBUILDVERSION)"
            echo "ThisBuildVersion: $(ThisBuildVersion)"
            echo "-------------------------------- "
            set 
      
      - task: DownloadBuildArtifacts@0
        displayName: "Download NuGet packages"
        inputs:
          downloadType: "single"
          artifactName: "nuget-packages"
          downloadPath: "$(Build.ArtifactStagingDirectory)"
        condition: succeeded()

      - task: NuGetCommand@2
        displayName: "NuGet push v$(TagVersion)"
        inputs:
          command: "push"
          packagesToPush: "$(Build.ArtifactStagingDirectory)/**/*.nupkg"
          nuGetFeedType: "external"
          publishFeedCredentials: "sqs-nuget"
        condition: and(succeeded(), eq(variables['PublishNuGet'], true))

      - task: GitHubRelease@1
        displayName: "Release to GitHub v$(TagVersion)"
        inputs:
          gitHubConnection: "github-packages-sqs"
          repositoryName: "$(Build.Repository.Name)"
          action: "create"
          target: "$(Build.SourceVersion)"
          tagSource: "userSpecifiedTag"
          tag: "$(TagVersion)"
          title: "v$(TagVersion)"
          releaseNotesSource: "inline"
          releaseNotesInline: "Documentation https://github.com/$(Build.Repository.Name)"
          isPreRelease: true
          changeLogCompareToRelease: "lastFullRelease"
          changeLogType: "commitBased"
          addChangeLog: false
          assetUploadMode: "replace"
          assets: "$(Build.ArtifactStagingDirectory)/**/*"
        condition: and(succeeded(), eq(variables['PublishGitHub'], true))
