parameters:
  - name: displayName
    type: string
  - name: architecture
    type: string
  - name: matrixConfigs
    type: object

jobs:
  - job: ${{ parameters.architecture }}
    displayName: ${{ parameters.displayName }}
    workspace:
      clean: all
    pool:
      name: Default
      demands:
        - Agent.OS -equals Windows_NT
        - Agent.OSArchitecture -equals ${{ parameters.architecture }}
    strategy:
      matrix: ${{ parameters.matrixConfigs }}
    steps:
      - checkout: self
        name: step1

      - task: CmdLine@2
        displayName: "Install Ninja on Windows"
        inputs:
          script: |
            winget install ninja-build.ninja
            ninja --version
        continueOnError: true
          
      #- task: BatchScript@1
      #  displayName: "Detect the paths of Visual Studio and MSBuild.."
      #  inputs:
      #    filename: pipeline_detect_vs_path.bat
      #    modifyEnvironment: true
      
      - task: CmdLine@2
        displayName: "Review all environment variables."
        inputs:
          script: |
            @echo off
            rem detect the location of Visual Studio vcvars and set the path

            rem Path to vswhere.exe (usually installed with VS)
            set "vswhere=%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe"

            rem Find the installation path of the latest Visual Studio version
            for /f "usebackq tokens=*" %%i in (`"%vswhere%" -latest -property installationPath`) do (
                set "VS_PATH=%%i"
            )

            if not defined VS_PATH (
                echo Visual Studio installation not found.
                exit /b 1
            )

            rem vcvarsall.bat location for VS 2017+
            set "VCVARS_PATH=%VS_PATH%\VC\Auxiliary\Build\vcvarsall.bat"
            echo "Found Visual Studio at: `%VS_PATH%`"
            echo "Found vcvarsall.bat at: `%VCVARS_PATH%`"
            echo "Saving the %VCVARS_PATH% to environment variables"
            echo ##vso[task.setvariable variable=VCVARS_PATH]%VCVARS_PATH%
            echo "done."
        continueOnError: false

        # Use this task to allow the environment variables set by the batch script to be available in subsequent tasks.
      - task: BatchScript@1
        displayName: "Install paths.. $(VCVARS_PATH) $(AGENT_OSARCHITECTURE)"
        inputs:
          filename: '$(VCVARS_PATH)'
          arguments: '$(AGENT_OSARCHITECTURE)'
          modifyEnvironment: true
      
      - task: CmdLine@2
        displayName: "Review all environment variables."
        inputs:
          script: |
            set
        continueOnError: true
      
      - task: gitversion-setup@4
        displayName: "Install GitVersion.."
        inputs:
          versionSpec: "6.x"
          preferLatestVersion: true

      - task: gitversion-execute@4
        displayName: "Determine Version.."
        name: version_step
        inputs:
          useConfigFile: true
          configFilePath: "GitVersion.yml"

      - task: CMake@1
        displayName: "CMake Configure $(cmake.preset)"
        inputs:
          cmakeArgs: "--preset $(cmake.preset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH) -DCPM_SOURCE_CACHE=$(Agent.HomeDirectory)/.cpmcache"
          workingDirectory: "$(System.DefaultWorkingDirectory)"

      - task: CMake@1
        displayName: "CMake Build $(cmake.preset)"
        inputs:
          cmakeArgs: "--build --preset $(cmake.preset) -DCI_BUILDID=$(GITVERSION_MAJORMINORPATCH)  -DCPM_SOURCE_CACHE=$(Agent.HomeDirectory)/.cpmcache"
          workingDirectory: "$(System.DefaultWorkingDirectory)"
        condition: succeeded()

      - task: CMake@1
        displayName: "CMake Tests $(cmake.preset)"
        inputs:
          cmakeArgs: "-E chdir $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests ctest $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests --output-junit $(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml --output-on-failure"
        continueOnError: true
        condition: succeeded()

      - task: PublishTestResults@2
        displayName: "Publish $(BuildType) Test Results $(cmake.preset)_test_detail.xml"
        inputs:
          testResultsFormat: "JUnit"
          testResultsFiles: "$(System.DefaultWorkingDirectory)/build/$(cmake.preset)/tests/results/$(cmake.preset)_test_detail.xml"
          mergeTestResults: false
          buildConfiguration: "$(BuildType)"
        continueOnError: true
        condition: succeeded()

      - task: NuGetToolInstaller@1
        displayName: "Install Nuget on Windows"
        inputs:
          versionSpec: ">=6.0.0-0"
          checkLatest: true
        condition: and(succeeded(), startsWith(variables['Agent.OS'], 'Windows'))

      - task: NuGetCommand@2
        displayName: "NuGet pack v$(GITVERSION_MAJORMINORPATCH)"
        inputs:
          command: "pack"
          packagesToPack: "pack/*.nuspec"
          versioningScheme: "off"
          buildProperties: "VERSION=$(GITVERSION_MAJORMINORPATCH)"
        condition: and(succeeded(), startsWith(variables['Agent.OS'], 'Windows'))

      - task: NuGetCommand@2
        displayName: "NuGet push (Windows only)"
        inputs:
          command: "push"
          packagesToPush: "$(Build.ArtifactStagingDirectory)/**/*.nupkg;build/*.nupkg"
          nuGetFeedType: "external"
          publishFeedCredentials: "sqs-nuget"
        condition: and(succeeded(), eq(variables['BuildType'], 'Release'), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')), startsWith(variables['Agent.OS'], 'Windows'))

      - task: GitHubRelease@1
        displayName: "Release to GitHub"
        inputs:
          gitHubConnection: "github-packages-sqs"
          repositoryName: "$(Build.Repository.Name)"
          action: "create"
          target: "$(Build.SourceVersion)"
          tagSource: "userSpecifiedTag"
          tag: "$(GITVERSION_MAJORMINORPATCH)"
          title: "v$(GITVERSION_MAJORMINORPATCH)"
          releaseNotesSource: "inline"
          releaseNotesInline: "Documentation https://github.com/$(Build.Repository.Name)"
          isPreRelease: true
          changeLogCompareToRelease: "lastFullRelease"
          changeLogType: "commitBased"
          addChangeLog: false
          assetUploadMode: "replace"
        condition: and(succeeded(), eq(variables['BuildType'], 'Release'), or(eq(variables['Build.SourceBranch'], 'refs/heads/main'), eq(variables['Build.SourceBranch'], 'refs/heads/master')), startsWith(variables['Agent.OS'], 'Windows'))
